<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Abdullah mubarok/</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-color: #38bdf8;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        /* Container Utama */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        /* Bagian Atas / Header Gambar */
        .header-gradient {
            height: 120px;
            background: linear-gradient(45deg, #0ea5e9, #6366f1);
        }

        /* Foto Profil */
        .profile-wrapper {
            position: relative;
            margin-top: -60px;
            display: inline-block;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary-bg);
            object-fit: cover;
            background: #ccc;
        }

        .status-dot {
            width: 18px;
            height: 18px;
            background: #22c55e;
            border: 3px solid var(--primary-bg);
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* Nama & Role */
        .info { margin: 15px 0 30px; }
        .info h1 { font-size: 1.5rem; letter-spacing: 1px; text-transform: uppercase; }
        .info p { color: var(--accent-color); font-size: 0.8rem; font-weight: 600; letter-spacing: 2px; margin-top: 5px; }

        /* Project Links */
        .links-container { padding: 0 30px; }
        .project-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 12px;
            padding: 15px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--text-main);
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .project-link:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-color);
            transform: translateX(5px);
        }

        /* Tombol CV */
        .download-btn {
            display: block;
            margin: 25px 30px;
            padding: 15px;
            background: var(--text-main);
            color: var(--primary-bg);
            text-decoration: none;
            font-weight: 700;
            border-radius: 15px;
            transition: 0.3s;
        }

        .download-btn:hover { background: var(--accent-color); transform: scale(1.02); }

        /* Social Icons */
        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: var(--text-main);
            text-decoration: none;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .social-icon:hover {
            background: var(--accent-color);
            color: white;
            transform: translateY(-5px);
        }

        footer {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-gradient"></div>
        
        <div class="profile-wrapper">
            <img src="bdull.jpg" alt="Abdullah mubarok" class="profile-img">
            <div class="status-dot"></div>
        </div>

        <div class="info">
            <h1>Abdullah mubarok</h1>
            <p>STUDENT | DEVELOPER</p>
        </div>

        <div class="links-container">
            
            <a href="https://project-pendaftaran-santri-baru-psb.vercel.app/" class="project-link">
                <span>Psb-Santri</span>
                <i class="fas fa-chevron-right"></i>
            </a>
            <a href="https://koki-store.vercel.app/login/" class="project-link">
                <span>Financial Tracker</span>
                <i class="fas fa-chevron-right"></i>
            </a>
         
        </div>

        <a href="cv-abdullah.pdf" class="download-btn" onclick="downloadAction()">DOWNLOAD CV</a>

        <div class="socials">
            <a href="mailto:abdullahmubarok091207@gmail.com" class="social-icon" title="Kirim email ke abdullah">
                <i class="fas fa-envelope"></i>
            </a>
            <a href="https://wa.me/6281235552253" target="_blank" class="social-icon" title="whatsapp">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="https://github.com/abdullah091207" target="_blank" class="social-icon" title="GitHub">
                <i class="fab fa-github"></i>
            </a>
        </div>

        <footer>© 2026 PPQIT AL MAHIR</footer>
    </div>

    <script>

            alert("Memulai pengunduhan CV Abdullah mubarok...");
            // Kamu bisa arahkan ke file PDF asli nanti:
            // window.location.href = 'file-cv-kamu.pdf';
        }
    </script>
</body>
</html>
